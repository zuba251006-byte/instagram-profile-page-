<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css?family=Open+Sans:300,400,600">
    <link rel="stylesheet" href="https://use.fontawesome.com/releases/v5.15.4/css/all.css">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Instagram Profile Page</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <!-- Background Video -->
<div class="video-bg">
    <video autoplay muted loop playsinline>
        <source src="insta2.mp4" type="video/mp4">
    </video>
</div>

    <div class="content">
<header>
    <div class="container">
        <div class="profile">

            <!-- Profile Image -->
            <div class="profile-image">
                <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcRblqV-O5JX6GLDB44ERRFVSVHEg5PtRB_yaw&s" alt="">
            </div>

            <!-- Profile Info -->
            <div class="profile-info">

                <div class="profile-user-setting">
                    <h1 class="profile-User-Name">zm_vish</h1>
                    <button class="profile-edit-btn">Edit Profile</button>
                    <button aria-label="profile-settings" class="setting-edit-btn">
                        <i class="fas fa-cog"></i>
                    </button>
                </div>

                <div class="profile-stats">
                    <ul>
                        <li><span class="profile-stats-count">100</span> posts</li>
                        <li><span class="profile-stats-count">200</span> followers</li>
                        <li><span class="profile-stats-count">164</span> following</li>
                    </ul>
                </div>

                <div class="profile-bio">
                    <p>
                        <span class="profile-real-name">Zubiya Mehvish</span><br>
                        الحمداللہ 🌼
                    </p>
                </div>

            </div>

        </div>
    </div>
</header>

<main>
    <div class="container">
        <div class="gallery">

            <div class="gallery-item">
                <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcQtfwf6Gtsxxu1G1mBWzJZCT1v9leIT_drh0Q&s" alt="post">
            </div>

            </div>

            <div class="gallery-item">
                <img src="https://media.istockphoto.com/id/1824636211/photo/multiracial-female-tourist-visiting-and-walking-in-mosque.jpg?s=612x612&w=0&k=20&c=OZ7aLqklFMNVY1HV3JchVCeuu66apq1lT8r6zB8WJoE=" alt="post">
            </div>

            <div class="gallery-item">
                <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcSbQSUN92_cyqtXeP9v-okjyBesLpMJ_duRmg&s" alt="post">

</main>
</div>

</html>
